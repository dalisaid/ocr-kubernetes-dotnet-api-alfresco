mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib
  tag: latest

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

config:
  receivers:
    otlp:
      protocols:
        grpc: 
          endpoint: "0.0.0.0:4317"
        http: 
          endpoint: "0.0.0.0:4318"

  exporters:
    debug: {}
    otlp:
      endpoint: tempo:4317
      tls:
        insecure: true

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlp, debug]