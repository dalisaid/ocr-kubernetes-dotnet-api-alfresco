adminUser: admin
adminPassword: "admin"

service:
  type: NodePort
  port: 80
  nodePort: 30000

persistence:
  enabled: false
 
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    searchNamespace: ocr-lab
  

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        url: http://prometheus-server:80
        isDefault: true

      - name: Tempo
        uid: tempo
        type: tempo
        url: http://tempo:3200
        access: proxy
        isDefault: false
        jsonData:
          httpMethod: GET
          tracesToLogsV2:
            datasourceUid: loki
          serviceMap:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true

      - name: Loki
        uid: loki
        type: loki
        url: http://loki:3100
        access: proxy
        isDefault: false
        jsonData:
          httpMethod: GET
          derivedFields:
            - name: TraceID
              matcherRegex: "traceId=(\\w+)"
              url: "$${__value.raw}"
              urlDisplayLabel: "View Trace"
              datasourceUid: tempo

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
         path: /tmp/dashboards

