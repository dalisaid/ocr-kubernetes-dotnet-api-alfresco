# ---------------------------------------------------------------
# Redis — Bitnami Helm values
# Dev setup for Docker Desktop / single-node Kubernetes
# ---------------------------------------------------------------

# Standalone mode — no replication needed for dev
architecture: standalone

auth:
  # No password for dev — services connect without credentials
  enabled: false

master:
  # No persistence — in-memory only, job status lost on restart (fine for dev)
  persistence:
    enabled: false

  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 200m

# Expose Redis inside the cluster only
service:
  type: ClusterIP
  port: 6379

# Enable Prometheus metrics via redis-exporter sidecar
metrics:
  enabled: true
  serviceMonitor:
    # Set to true if you installed kube-prometheus-stack (which you did via Helm)
    enabled: true
    namespace: ocr-lab
    interval: 30s
