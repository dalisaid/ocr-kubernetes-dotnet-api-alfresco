apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-tesseract
  namespace: ocr-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: engine-tesseract
  template:
    metadata:
      labels:
        app: engine-tesseract
    spec:
      containers:
        - name: engine-tesseract
          image: ocr-tesseract:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 8001

          env:
            # ── Worker infrastructure ──────────────────────────
            - name: RABBITMQ_URL
              value: "amqp://admin:admin@rabbitmq:5672/"
            - name: REDIS_URL
              value: "redis://redis-master:6379"
            - name: JOB_TTL
              value: "3600"
            # .NET API is outside the cluster on the host machine
            - name: DOTNET_API_URL
              value: "http://host.docker.internal:5122/ocrdata"
            # ── Observability ──────────────────────────────────
            - name: OTEL_ENDPOINT
              value: "otel-collector-opentelemetry-collector:4317"

          startupProbe:
            httpGet:
              path: /healthz
              port: 8001
            failureThreshold: 10
            periodSeconds: 5

          readinessProbe:
            httpGet:
              path: /healthz
              port: 8001
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: engine-tesseract
  namespace: ocr-lab
spec:
  selector:
    app: engine-tesseract
  ports:
    - port: 8001
      targetPort: 8001
