apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: ocr-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: ocr-gateway:latest   # ✅ FIXED
          imagePullPolicy: Never

          ports:
            - containerPort: 8000

          env:
            - name: TESSERACT_URL
              value: "http://engine-tesseract:8001"
            - name: EASYOCR_URL
              value: "http://engine-easyocr:8002"
            - name: PADDLE_URL
              value: "http://engine-paddle:8003"

          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: ocr-lab
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30010