apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: ocr-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: ocr-gateway:latest
          imagePullPolicy: Always #use "Always" when testing jenkins otherwise "IfNotPresent" for local daemon

          ports:
            - containerPort: 8000

          env:
            # ── Async infrastructure ───────────────────────────
            - name: RABBITMQ_URL
              value: "amqp://admin:admin@rabbitmq:5672/"
            - name: REDIS_URL
              value: "redis://redis-master:6379"
            - name: JOB_TTL
              value: "3600"

            # ── Engine URLs kept for /engines info endpoint ────
            # Gateway no longer calls these directly (async now)
            # but the /engines list endpoint still references them
            - name: TESSERACT_URL
              value: "http://engine-tesseract:8001"
            - name: EASYOCR_URL
              value: "http://engine-easyocr:8002"
            - name: PADDLE_URL
              value: "http://engine-paddle:8003"

          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: ocr-lab
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30010
