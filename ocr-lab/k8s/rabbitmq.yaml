# ---------------------------------------------------------------
# RabbitMQ — dev manifest
# Official rabbitmq:3.13-management image
# No persistence — dev/testing only
# ---------------------------------------------------------------

apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-config
  namespace: ocr-lab
data:
  enabled_plugins: |
    [rabbitmq_management,rabbitmq_prometheus].
  rabbitmq.conf: |
    vm_memory_high_watermark.absolute = 256MiB

---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secret
  namespace: ocr-lab
type: Opaque
stringData:
  username: admin
  password: admin

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: ocr-lab
  labels:
    app: rabbitmq
spec:
  serviceName: rabbitmq
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "15692"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management
          imagePullPolicy: IfNotPresent
          ports:
            - name: amqp
              containerPort: 5672
            - name: management
              containerPort: 15672
            - name: metrics
              containerPort: 15692
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: username
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: password
            - name: RABBITMQ_ERLANG_COOKIE
              value: "ocr-dev-cookie"
          volumeMounts:
            - name: rabbitmq-config
              mountPath: /etc/rabbitmq/enabled_plugins
              subPath: enabled_plugins
            - name: rabbitmq-config
              mountPath: /etc/rabbitmq/rabbitmq.conf
              subPath: rabbitmq.conf
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          # Startup probe — gives RabbitMQ up to 5 minutes to boot before
          # liveness/readiness kick in. Uses ping so it waits for full broker
          # readiness, not just the TCP port opening.
          startupProbe:
            exec:
              command: ["rabbitmq-diagnostics", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30    # 30 * 10s = 5 minutes max startup time
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "ping"]
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 10
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "ping"]
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 10
      volumes:
        - name: rabbitmq-config
          configMap:
            name: rabbitmq-config

---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: ocr-lab
  labels:
    app: rabbitmq
spec:
  type: ClusterIP
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
    - name: metrics
      port: 15692
      targetPort: 15692