apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-paddle
  namespace: ocr-lab
  labels:
    app: engine-paddle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: engine-paddle
  template:
    metadata:
      labels:
        app: engine-paddle
    spec:
      containers:
        - name: engine-paddle
          image: ocr-paddle:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8003

          env:
            # ── Worker infrastructure ──────────────────────────
            - name: RABBITMQ_URL
              value: "amqp://admin:admin@rabbitmq:5672/"
            - name: REDIS_URL
              value: "redis://redis-master:6379"
            - name: JOB_TTL
              value: "3600"
            # .NET API is outside the cluster on the host machine
            - name: DOTNET_API_URL
              value: "http://host.docker.internal:5122/ocrdata"
            # ── Observability ──────────────────────────────────
            - name: OTEL_ENDPOINT
              value: "otel-collector-opentelemetry-collector:4317"

          startupProbe:
            httpGet:
              path: /healthz
              port: 8003
            failureThreshold: 40
            periodSeconds: 5

          readinessProbe:
            httpGet:
              path: /healthz
              port: 8003
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8003
            initialDelaySeconds: 40
            periodSeconds: 20

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"

---
apiVersion: v1
kind: Service
metadata:
  name: engine-paddle
  namespace: ocr-lab
spec:
  selector:
    app: engine-paddle
  ports:
    - port: 8003
      targetPort: 8003
