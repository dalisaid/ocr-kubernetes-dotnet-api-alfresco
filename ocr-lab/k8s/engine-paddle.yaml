apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-paddle
  namespace: ocr-lab
  labels:
    app: engine-paddle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: engine-paddle
  template:
    metadata:
      labels:
        app: engine-paddle
    spec:
      containers:
        - name: engine-paddle
          image: ocr-paddle:latest   # ✅ FIXED
          imagePullPolicy: Never

          ports:
            - containerPort: 8003    # ✅ FIXED

          # ❌ REMOVED:
          # - volumes
          # - volumeMounts
          # - MODEL_STORAGE_DIR

          startupProbe:
            httpGet:
              path: /healthz
              port: 8003
            failureThreshold: 40     # Paddle can be slow
            periodSeconds: 5

          readinessProbe:
            httpGet:
              path: /healthz
              port: 8003
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8003
            initialDelaySeconds: 40
            periodSeconds: 20

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"

---
apiVersion: v1
kind: Service
metadata:
  name: engine-paddle
  namespace: ocr-lab
spec:
  selector:
    app: engine-paddle
  ports:
    - port: 8003
      targetPort: 8003